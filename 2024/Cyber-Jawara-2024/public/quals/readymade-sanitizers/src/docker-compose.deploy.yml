services:
  php:
      image: web-readymade-sanitizers-php:latest
      build: ./
      volumes:
        - ./src:/app/
      command: ["php", "-t", "/app", "-S", "0.0.0.0:1234"]
      deploy:
        replicas: 1
        restart_policy:
          condition: any
      ports:
        - 1230:1234
  bot:
      image: web-readymade-sanitizers-bot:latest
      build: ./bot/
      restart: always
      env_file:
        - .env
      ports:
        - 8182:8000
      deploy:
        replicas: 1
        restart_policy:
          condition: any
      depends_on:
        - php
    